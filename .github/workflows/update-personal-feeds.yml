name: Update Personal Feeds

on:
  schedule:
    # 每天新加坡时间 08:00（UTC 00:00）运行
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  update-feeds:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        working-directory: scripts
        run: npm install

      - name: Update feeds
        working-directory: scripts
        run: node update-feeds.js

      - name: Commit updated feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed-youtube.json feed-jobs.json feed-data-industry.json
          git diff --staged --quiet || git commit -m "chore: update personal feeds $(date -u '+%Y-%m-%d')"
          git push
